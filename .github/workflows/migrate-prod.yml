name: migrate-prod

# Manual, human-gated production migration: applies the committed Drizzle
# migrations (drizzle/) to the production database. Deliberately NOT automatic
# on merge — see docs/deploy.md. Auto-apply on merge should ride on the #14
# per-PR migration validation before it's trusted to run unattended.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "migrate" to confirm applying migrations to PRODUCTION'
        required: true
        type: string

permissions:
  contents: read

# Never run two migrations at once, and never cancel one mid-flight.
concurrency:
  group: migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    name: migrate production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Optional approval gate: add required reviewers to a "production" GitHub
    # Environment (Settings → Environments), and/or scope the secret to it.
    environment: production
    steps:
      - name: Verify confirmation
        if: ${{ inputs.confirm != 'migrate' }}
        run: |
          echo "::error::confirmation phrase not matched — aborting"
          exit 1

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Uses the SESSION/DIRECT connection — drizzle-kit uses prepared statements
      # the transaction pooler (:6543) rejects. Store it as the secret
      # PROD_MIGRATE_DATABASE_URL (repo- or production-environment-scoped).
      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_MIGRATE_DATABASE_URL }}
        run: bun run db:migrate

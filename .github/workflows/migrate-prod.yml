name: migrate-prod

# Applies the committed Drizzle migrations (drizzle/) to production. Runs
# automatically on merge to main when drizzle/ changes, and can also be
# dispatched manually. The production environment's required reviewer gates
# every run — the job pauses for approval before any migration touches prod.
# See docs/deploy.md.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "migrate" to confirm applying migrations to PRODUCTION'
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - 'drizzle/**'

permissions:
  contents: read

# Never run two migrations at once, and never cancel one mid-flight.
concurrency:
  group: migrate-prod
  cancel-in-progress: false

jobs:
  # No environment on this job, so it runs the moment the workflow triggers —
  # while `migrate` below is still paused on the approval gate. Without it the
  # pending approval is invisible unless someone happens to open the Actions tab.
  notify-approval-needed:
    name: ping for approval
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_MIGRATIONS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER: ${{ github.event_name == 'workflow_dispatch' && format('manual dispatch by {0}', github.actor) || github.event.head_commit.message }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::notice::DISCORD_MIGRATIONS_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi
          FIRST_LINE=$(printf '%s' "$TRIGGER" | head -1 | cut -c1-140)
          CONTENT=$(printf '🗄️ **Prod migration awaiting approval** — %s\nApprove: %s' "$FIRST_LINE" "$RUN_URL")
          # Best-effort: a Discord outage must not paint the migration run red.
          jq -n --arg content "$CONTENT" '{content: $content}' \
            | curl -sf -H 'Content-Type: application/json' -d @- "$WEBHOOK_URL" \
            || echo "::warning::Discord notification failed — approve via the Actions tab"

  migrate:
    name: migrate production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Holds the required-reviewer approval gate and the PROD_MIGRATE_DATABASE_URL
    # secret; the job pauses here for approval on every run.
    environment: WT Records / production
    steps:
      # Manual runs need the typed phrase too; merge-triggered runs rely on the
      # environment approval gate above.
      - name: Verify confirmation
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm != 'migrate' }}
        run: |
          echo "::error::confirmation phrase not matched — aborting"
          exit 1

      # Fail fast with a clear message instead of a generic Drizzle connection
      # error if the secret is missing / not scoped to this environment.
      - name: Verify secret is configured
        env:
          DATABASE_URL: ${{ secrets.PROD_MIGRATE_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::PROD_MIGRATE_DATABASE_URL is empty — add it as a secret on this job's environment (Supabase session/direct URL, not the :6543 pooler)."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Uses the SESSION/DIRECT connection — drizzle-kit uses prepared statements
      # the transaction pooler (:6543) rejects. Store it as the secret
      # PROD_MIGRATE_DATABASE_URL (repo- or production-environment-scoped).
      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_MIGRATE_DATABASE_URL }}
        run: bun run db:migrate

  # Closes the loop after approval: did the migration actually apply?
  notify-result:
    name: ping result
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: migrate
    if: ${{ always() && needs.migrate.result != 'skipped' }}
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_MIGRATIONS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ needs.migrate.result }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::notice::DISCORD_MIGRATIONS_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi
          case "$RESULT" in
            success) MSG="✅ **Prod migration applied**" ;;
            cancelled) MSG="🚫 **Prod migration cancelled**" ;;
            # A rejected approval also surfaces as `failure`, indistinguishable
            # from a migration error here — the message stays honest about both.
            *) MSG="❌ **Prod migration did not apply** (failed or rejected) — ${RUN_URL}" ;;
          esac
          # Best-effort: a Discord outage must not paint the migration run red.
          jq -n --arg content "$MSG" '{content: $content}' \
            | curl -sf -H 'Content-Type: application/json' -d @- "$WEBHOOK_URL" \
            || echo "::warning::Discord notification failed — check the run result in the Actions tab"

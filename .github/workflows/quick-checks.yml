name: quick-checks

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: the job only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to keep feedback fast.
concurrency:
  group: quick-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    name: typecheck + lint + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Bun installs + dispatches scripts; the underlying tools (vite, vitest,
      # tsc, eslint) and the SSR server run on Node, so pin both.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate route tree
        run: bun run generate-routes

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

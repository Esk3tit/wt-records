name: quick-checks

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: the job only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to keep feedback fast.
concurrency:
  group: quick-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deploying? See the deploy runbook: docs/deploy.md (Railway + the manual
# migration step this fast check does NOT run).
jobs:
  quick-checks:
    # This name IS the required status check in branch protection — keep the
    # two in sync when renaming, or merges block on a missing check.
    name: typecheck + lint + format + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Bun installs + dispatches scripts; the underlying tools (vite, vitest,
      # tsc, eslint) and the SSR server run on Node, so pin both.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate route tree
        run: bun run generate-routes

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run check

      - name: Test
        run: bun run test

  # Advisory only: surfaces design-system drift (contrast, slop patterns)
  # without gating merges — it is NOT a required status check.
  design-detect:
    name: design detect (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Detect design drift
        run: npx -y impeccable detect src/

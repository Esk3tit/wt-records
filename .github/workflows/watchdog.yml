# Synthetic monitoring: probes the live landing on a schedule and keeps a
# single "watchdog" issue in sync — opened with provider-status context when
# prod is unreachable, closed automatically on recovery. Every 30 minutes
# rather than tighter so the sleeping app still gets to sleep between probes.
name: prod watchdog

concurrency:
  group: prod-watchdog
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  issues: write

env:
  GH_TOKEN: ${{ github.token }}
  GH_REPO: ${{ github.repository }}
  PROD_URL: https://wt-records-production.up.railway.app/grb

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe production
        id: probe
        run: |
          probe() { curl -s --compressed -m "$1" -o /dev/null -w '%{http_code}' "$PROD_URL" || echo 000; }
          code=$(probe 30)
          # The app sleeps when idle; give a cold start one long retry.
          if [ "$code" != "200" ]; then
            sleep 20
            code=$(probe 60)
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "Probe result: HTTP $code"

      - name: Gather provider status
        id: provider
        if: steps.probe.outputs.code != '200'
        run: |
          summary=$(curl -s -m 15 https://status.supabase.com/api/v2/summary.json || echo '{}')
          overall=$(echo "$summary" | jq -r '.status.description // "unknown"')
          uswest=$(echo "$summary" | jq -r '[.components[]? | select(.name == "us-west-1") | .status] | first // "unknown"')
          echo "overall=$overall" >> "$GITHUB_OUTPUT"
          echo "uswest=$uswest" >> "$GITHUB_OUTPUT"

      - name: Raise the alarm
        if: steps.probe.outputs.code != '200'
        env:
          PROBE_CODE: ${{ steps.probe.outputs.code }}
          PROVIDER_OVERALL: ${{ steps.provider.outputs.overall }}
          PROVIDER_USWEST: ${{ steps.provider.outputs.uswest }}
        run: |
          gh label create watchdog --color D93F0B --description "Automated prod alarm" 2>/dev/null || true
          open=$(gh issue list --label watchdog --author 'github-actions[bot]' --state open --json number --jq '.[0].number // empty')
          if [ -n "$open" ]; then
            echo "Watchdog issue #$open already open — leaving it."
            exit 0
          fi
          hint="does NOT look provider-side — investigate the app/deploy"
          if [ "$PROVIDER_USWEST" != "operational" ]; then
            hint="likely provider-side (check status.supabase.com before touching the app)"
          fi
          {
            echo "Scheduled probe of $PROD_URL failed with HTTP $PROBE_CODE (after a cold-start retry)."
            echo
            echo "Supabase status: **$PROVIDER_OVERALL** · us-west-1: **$PROVIDER_USWEST** — $hint."
            echo
            echo "Runbook: docs/deploy.md § healthcheck triage. This issue closes automatically when a probe succeeds."
          } > /tmp/watchdog-body.md
          gh issue create --label watchdog \
            --title "🚨 Watchdog: prod unreachable (HTTP $PROBE_CODE)" \
            --body-file /tmp/watchdog-body.md

      - name: Stand down on recovery
        if: steps.probe.outputs.code == '200'
        run: |
          for n in $(gh issue list --label watchdog --author 'github-actions[bot]' --state open --json number --jq '.[].number'); do
            gh issue close "$n" --comment "Probe succeeded (HTTP 200) — standing down."
          done

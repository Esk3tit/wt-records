name: migration-check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: migration-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-check:
    # This name IS the required status check in branch protection — keep the two
    # in sync when renaming, or a bad migration could merge on a missing check.
    name: migrations apply to a fresh database
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Ephemeral throwaway Postgres (same major version as the Supabase project)
    # proving the committed migrations apply from scratch — no branch, secret, or
    # cost. drizzle-kit connects directly, so a plain container is faithful.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Don't rely on the runner image shipping psql; guarantee the client.
      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      # Stand up the auth.users table + roles a real Supabase project provides,
      # which the migrations reference.
      - name: Seed Supabase-provided objects
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/supabase-shim.sql

      # The 0001 migration is a no-op unless this publication exists (it's guarded
      # for PGlite); create it so the check exercises its ADD TABLE for real.
      - name: Create Realtime publication
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "create publication supabase_realtime;"

      - name: Apply migrations
        run: bun run db:migrate
